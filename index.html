<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Allan Nambafu — Operations & Digital Solutions Specialist</title>
  <meta name="description" content="5+ years optimizing virtual operations, CRM, customer support, digital marketing & SQL reporting." />
  
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0e1c;
      --surface:     #13152a;
      --card:        #161829;
      --border:      #2a2d4a;
      --primary:     #7c6ef7;
      --primary-2:   #a78bfa;
      --indigo-glow: #b8a9ff;
      --fg:          #f0eeff;
      --muted:       #8e8eb0;
      --gold:        #f59e0b;
      --teal:        #2dd4bf;
      --radius:      0.75rem;
      --grad-primary: linear-gradient(135deg, #7c6ef7, #a78bfa);
      --grad-hero:    radial-gradient(circle at 20% 0%, rgba(124,110,247,.55) 0%, transparent 50%),
                      radial-gradient(circle at 80% 30%, rgba(139,92,246,.35) 0%, transparent 50%),
                      linear-gradient(180deg, #0d0e1c 0%, #090a16 100%);
      --shadow-glow: 0 20px 60px -20px rgba(124,110,247,.5);
      --shadow-card: 0 8px 24px -8px rgba(0,0,0,.6);
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--fg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; line-height: 1.6; }
    h1,h2,h3,h4 { font-family: var(--font-display); letter-spacing: -.02em; line-height: 1.15; }
    a { color: inherit; text-decoration: none; transition: 0.2s; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
    .hidden { display: none !important; }

    /* ── HEADER ── */
    #site-header {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      background: rgba(13,14,28,.75); border-bottom: 1px solid var(--border);
    }
    .header-inner { height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: .6rem; cursor: pointer; }
    .logo-badge { height: 36px; width: 36px; border-radius: .5rem; background: var(--grad-primary); display: grid; place-items: center; font-weight: 700; color: #fff; }
    nav.desktop { display: flex; align-items: center; gap: .25rem; }
    nav.desktop a { padding: .5rem 1rem; border-radius: .5rem; font-size: .875rem; color: var(--muted); }
    nav.desktop a.active, nav.desktop a:hover { color: var(--fg); background: rgba(42,45,74,.7); }

    /* ── PAGES ── */
    .page { display: none; min-height: 80vh; }
    .page.active { display: block; }

    /* ── COMPONENTS ── */
    .hero { position: relative; overflow: hidden; padding: 5rem 0; border-bottom: 1px solid var(--border); }
    .hero-bg { position: absolute; inset: 0; z-index: 0; background: var(--grad-hero); }
    .section { padding: 5rem 0; }
    .section-title { font-size: 2.25rem; font-weight: 700; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 10px; }
    .grid-2 { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); }
    .grid-3 { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    .card { padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--border); background: var(--card); box-shadow: var(--shadow-card); transition: 0.3s; }
    .card:hover { border-color: var(--primary); }
    .card-icon { height: 40px; width: 40px; background: rgba(42,45,74,.8); border-radius: 8px; display: grid; place-items: center; color: var(--primary); margin-bottom: 1rem; }
    .btn-primary { background: var(--grad-primary); color: #fff; padding: .8rem 1.4rem; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 600; }
    .btn-outline { border: 1px solid var(--border); padding: .8rem 1.4rem; border-radius: var(--radius); cursor: pointer; color: var(--fg); background: transparent; }

    /* ── EXPERIENCE ── */
    .exp-card { padding: 1.5rem 2rem; border-radius: 1.5rem; border: 1px solid var(--border); background: var(--card); margin-bottom: 1.25rem; }
    .exp-role { font-size: 1.2rem; font-weight: 600; }
    .exp-company { color: var(--primary); font-size: .875rem; }
    .exp-period { font-size: .875rem; color: var(--muted); float: right; }
    .exp-list { margin-top: 1rem; padding-left: 1.25rem; list-style: disc; color: var(--muted); font-size: 0.9rem; }

    /* ── FOOTER ── */
    #site-footer { border-top: 1px solid var(--border); background: #090a16; padding: 4rem 0 2rem; margin-top: 5rem; }
    .footer-grid { display: grid; gap: 3rem; grid-template-columns: 2fr 1fr 1fr; }
    @media (max-width: 768px) { .footer-grid { grid-template-columns: 1fr; } .exp-period { float: none; display: block; margin-top: 5px; } }
  </style>
</head>
